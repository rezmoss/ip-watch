name: Release

# Cut a release by pushing a semver tag:
#   git tag -a v1.0.0 -m "v1.0.0" && git push origin v1.0.0
# GoReleaser then builds every Linux arch, packages deb/rpm/apk (rpm GPG-signed),
# pushes the multi-arch container to ghcr.io (cosign keyless-signed), generates
# SBOMs, GPG-signs checksums.txt, and publishes a GitHub Release whose notes are
# grouped by Conventional Commit type (Added / Fixed / …).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release + upload assets
  packages: write # push container images to ghcr.io
  id-token: write # cosign keyless image signing via GitHub OIDC

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog can diff against the last tag

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      # Enables multi-arch (arm64) container builds via buildx.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      # Supply-chain tooling: cosign (keyless image signatures) + syft (SBOMs).
      - uses: sigstore/cosign-installer@v3
      - uses: anchore/sbom-action/download-syft@v0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: rezmoss
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Import the release GPG key into the runner keyring (for signing checksums)
      # and write it to a file (for nfpm's rpm signing via GPG_KEY_PATH).
      - name: Import GPG signing key
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "$GPG_PRIVATE_KEY" > "$RUNNER_TEMP/signing-key.asc"
          echo "GPG_KEY_PATH=$RUNNER_TEMP/signing-key.asc" >> "$GITHUB_ENV"
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-repo token so GoReleaser can push the formula to rezmoss/homebrew-tap.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          # SSH deploy key for pushing the PKGBUILD to the AUR (ip-watch-bin).
          AUR_KEY: ${{ secrets.AUR_KEY }}
          # GPG signing: fingerprint selects the key in the keyring; GPG_KEY_PATH is
          # the exported private key file used by nfpm to sign the .rpm.
          GPG_FINGERPRINT: ${{ secrets.GPG_FINGERPRINT }}
