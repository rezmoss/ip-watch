name: Release

# Cut a release by pushing a semver tag:
#   git tag -a v1.0.0 -m "v1.0.0" && git push origin v1.0.0
# GoReleaser then builds every Linux arch, packages deb/rpm/apk, pushes the
# multi-arch container to ghcr.io, and publishes a GitHub Release whose notes are
# grouped by Conventional Commit type (Added / Fixed / …).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub Release + upload assets
  packages: write # push container images to ghcr.io

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog can diff against the last tag

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      # Enables multi-arch (arm64) container builds via buildx.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
