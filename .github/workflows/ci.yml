name: CI

on:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Format
        run: test -z "$(gofmt -l $(find . -name '*.go' -not -path '*/vendor/*'))"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race ./...
      - name: Build
        run: CGO_ENABLED=0 go build -ldflags "-s -w" -o ip-watch ./cmd/ip-watch

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: End-to-end (all engines)
        run: ./test/e2e.sh
